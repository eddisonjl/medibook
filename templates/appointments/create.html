{% extends 'base.html' %}
{% block title %}Nueva Cita - MediBook{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow">
                <div class="card-header border-0 pt-4 px-4" style="background:linear-gradient(135deg,#1a73e8,#0d47a1); border-radius:12px 12px 0 0;">
                    <h4 class="text-white fw-bold mb-0"><i class="fas fa-calendar-plus me-2"></i>Agendar Nueva Cita</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-semibold">
                                <i class="fas fa-check-circle me-2"></i>Confirmar Cita
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
